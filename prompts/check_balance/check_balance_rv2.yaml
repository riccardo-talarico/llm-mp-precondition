_type: prompt
input_variables:
  - code
  - primitives
template: |
  Role: You are a Forensic Concurrency Auditor. 
  Your task is to perform a "reconciliation audit" of Go synchronization primitives to detect where execution paths might leave the system in an inconsistent or deadlocked state.
  Code:
  {code}
  Primitives:
  {primitives}
  Task:
  Perform a narrative trace of the code. Instead of listing primitives, walk through the execution logic as a "think-aloud" monologue. Focus on the following "reconciliation" dimensions:
  Channel Handshaking: Trace the movement of data. If I see a send, I must reason through where the receive lives. Is there a path (like a select case or a return on error) where a sender is left waiting forever? Think through whether a channel closure is guaranteed or if it could trigger a "send on closed channel" panic.
  Lock Lifecycle: Track the ownership of Mutexes. When a Lock() is called, look for the Unlock(). Reason through the control flow—is the Unlock() deferred? If not, could an early return leave the mutex "orphaned"?
  WaitGroup Counter Integrity: Analyze the Add() and Done() relationship. I need to think about whether the Add() happens before the Wait(), and if every spawned goroutine is guaranteed to hit a Done(), even during a panic or a failure.
  The Select Statement "Chaos": Specifically reason about select blocks. Does a default case or a timeout case break the balance of a primitive? If one case is chosen, what happens to the primitives in the other cases?
  Output Style (Chain of Thought):
  Style: Use analytical, narrative prose (e.g., "Looking at line 22, I see..."), like a chain of thought. Avoid headers like "Step 1" or "Mismatches." Instead, use phrases like:
  "Tracing the lifecycle of ch1, I notice that it's unbuffered, which implies..."
  "Looking at this select block, there's a risk that the ctx.Done() branch executes, leaving the mu.Lock() on line 45 without its corresponding Unlock()..."
  Termination: Once you have reconciled all primitives or identified a specific failure, stop. Do not provide generic summaries or repeat safety affirmations.
  Conciseness: If a primitive is clearly balanced and lacks complex interaction, acknowledge its safety in one sentence and move to the next "tension point."
  Focus: Only discuss the code provided. If no imbalances are found after a full trace, terminate the response.